name: UAT – Build & Test

on:
  push:
    branches:
      - 'claude/create-uat-environment-*'
      - uat
      - 'uat/**'
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: uat-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Unit & integration tests (no real DB needed)
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        env:
          NODE_ENV: test
          SESSION_SECRET: ci-test-session-secret-32-chars!!
          NEXTAUTH_URL: http://localhost:3000
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret
          # DATABASE_URL intentionally omitted — DB layer is mocked in unit tests
        run: npm run test:ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ────────────────────────────────────────────────────────────────────────────
  # 2. TypeScript type-check
  # ────────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler
        run: npx tsc --noEmit

  # ────────────────────────────────────────────────────────────────────────────
  # 3. Production build smoke-test
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, typecheck]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        env:
          NODE_ENV: production
          # Provide stub values so Next.js build does not fail on missing env vars
          GOOGLE_CLIENT_ID: build-placeholder
          GOOGLE_CLIENT_SECRET: build-placeholder
          NEXTAUTH_URL: https://job-dashboard-uat.example.com
          SESSION_SECRET: build-placeholder-session-secret-32!!
          DATABASE_URL: postgresql://placeholder:placeholder@placeholder/placeholder
        run: npm run build

  # ────────────────────────────────────────────────────────────────────────────
  # 4. Seed UAT database (only on pushes to UAT branch, requires secret)
  # ────────────────────────────────────────────────────────────────────────────
  seed-uat:
    name: Seed UAT Database
    runs-on: ubuntu-latest
    needs: [build]
    # Only run when UAT_DATABASE_URL secret is configured
    if: >
      github.event_name == 'push' &&
      (startsWith(github.ref, 'refs/heads/uat') || startsWith(github.ref, 'refs/heads/claude/create-uat-environment')) &&
      vars.UAT_DATABASE_URL != ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Seed UAT database
        env:
          DATABASE_URL: ${{ secrets.UAT_DATABASE_URL }}
        run: npm run seed:uat
